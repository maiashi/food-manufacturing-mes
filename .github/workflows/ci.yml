# ============================================================
# MES - GitHub Actions CI/CD Pipeline
# 1. Frontend: lint → test → build
# 2. Backend: compile + jOOQ codegen → test → shadowJar
# ============================================================

name: MES CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '24'
  POSTGRES_DB: mes_test_ci
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres

jobs:
  # ==================== FRONTEND ====================
  frontend:
    name: Frontend (Vue 3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: ESLint
        working-directory: ./frontend
        run: npm run lint

      - name: TypeScript check (temporarily skipped)
        run: echo "Skip frontend TypeScript check in CI"

      - name: Unit tests (Vitest)
        working-directory: ./frontend
        run: npm run test -- --passWithNoTests
        env:
          CI: true

      - name: Build (temporarily skipped)
        run: echo "Skip frontend build in CI"

  # ==================== BACKEND ====================
  backend:
    name: Backend (Spring Boot + jOOQ)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Gradle compile + jOOQ codegen
        working-directory: ./backend
        run: ./gradlew compileJava --no-daemon

      - name: Unit tests (JUnit 5)
        working-directory: ./backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:${{ job.services.postgres.ports[5432] }}/${{ env.POSTGRES_DB }}
          SPRING_DATASOURCE_USERNAME: ${{ env.POSTGRES_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        run: ./gradlew test --no-daemon

      - name: Build Shadow JAR
        working-directory: ./backend
        run: ./gradlew shadowJar --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/*.jar
          retention-days: 7

  # ==================== BUILD IMAGES (main only) ====================
  build-images:
    name: Build Docker Images
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}/mes-backend:${{ github.sha }}

      - name: Build Frontend Image (Dev)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.dev
          push: false
          tags: ghcr.io/${{ github.repository }}/mes-frontend-dev:${{ github.sha }}
