# ============================================================
# MES Backend - Application Configuration (Common)
# ============================================================

spring:
  application:
    name: mes-backend

  # データベース
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mes_dev}
    username: ${DB_USER:mes_admin}
    password: ${DB_PASSWORD:mes_secret}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 900000

  # jOOQ
  jooq:
    settings:
      render-quiote-style: "AS_IS"
      render-schemas: true

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000ms

  # Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# JWT設定
jwt:
  secret: ${JWT_SECRET:change-me-in-production-at-least-32-chars-long-here!}
  expiration-ms: 3600000       # 1時間
  refresh-expiration-ms: 86400000  # 24時間

# EMQX MQTT設定
mqtt:
  broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}
  client-id: mes-backend-${random.uuid}
  username: admin
  password: mes_emqx_admin
  subscription-topics:
    - "sensor/{factory}/+/data"     # センサーデータ
    - "alarm/{factory}/+/*"         # アラート
    - "haccp/{factory}/+/ccp"       # CCP監視

# サーバー
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1
  compression:
    enabled: true

# ログレベル
logging:
  level:
    com.mes: INFO
    org.jooq: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
