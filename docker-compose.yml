# ============================================================
# 食品製造業MES - Docker Compose (開発環境)
# PostgreSQL 17, EMQX, Kafka, Zookeeper, Redis
# ============================================================

services:
  # ---- データベース ----
  postgres:
    image: postgres:17-alpine
    container_name: mes-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mes_dev
      POSTGRES_USER: mes_admin
      POSTGRES_PASSWORD: mes_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/sql/init/:/docker-entrypoint-initdb.d/00-init
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c maintenance_work_mem=128MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mes_admin -d mes_dev"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- MQTTブローカー (EMQX) ----
  emqx:
    image: emqx/emqx:5.8.1
    container_name: mes-emqx
    restart: unless-stopped
    ports:
      - "18083:18083"   # Dashboard
      - "1883:1883"     # MQTT (TCP)
      - "8083:8083"     # MQTT (WebSocket)
      - "8883:8883"     # MQTT (TLS)
      - "8084:8084"     # MQTT (TLS WebSocket)
    environment:
      EMQX_NODE__NAME: emqx@127.0.0.1
      EMQX_NODE__COOKIE: emqx_secret_cookie_mes
      EMQX_CLUSTER__DISCOVERY_STRATEGY: static
      EMQX_CLUSTER__STATIC__SEEDS: emqx@127.0.0.1

      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: mes_emqx_admin

      EMQX_LISTENERS__WS__DEFAULT__MAX_CONNECTIONS: 1000

      EMQX_AUTH__POSTGRESQL__SERVER: "postgres:5432"
      EMQX_AUTH__POSTGRESQL__DATABASE: "mes_dev"
      EMQX_AUTH__POSTGRESQL__USERNAME: "mes_admin"
      EMQX_AUTH__POSTGRESQL__PASSWORD: "mes_secret"
    volumes:
      - emqx-data:/opt/emqx/data
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx_ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---- Zookeeper (Kafka用) ----
  zookeeper:
    image: confluentinc/cp-zookeeper:7.8.0
    container_name: mes-zookeeper
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zk-data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 1 localhost 2181 || bash -c 'exec 3<>/dev/tcp/localhost/2181; echo ruok >&3; timeout 2 cat <&3'"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- Kafka ----
  kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: mes-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"     # Internal listener
      - "9093:9093"     # External listener
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    depends_on:
      zookeeper:
        condition: service_healthy
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "cub", "kafka-ready", "1", "5", "-b", "kafka:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  # ---- Redis (キャッシュ/セッション) ----
  redis:
    image: redis:7-alpine
    container_name: mes-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save 60 1
        --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- バックエンド (Spring Boot + jOOQ) ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mes-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mes_dev
      SPRING_DATASOURCE_USERNAME: mes_admin
      SPRING_DATASOURCE_PASSWORD: mes_secret
      # EMQX MQTT
      MQTT_BROKER_URL: tcp://emqx:1883
      MQTT_CLIENT_ID: mes-backend
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # JWT
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      emqx:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---- フロントエンド (Vue 3 + Vite) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: mes-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - frontend-modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: http://backend:8080/api/v1
      VITE_MQTT_BROKER_URL: ws://emqx:8083/mqtt
    depends_on:
      backend:
        condition: service_started

  # ---- Nginxプロキシ (開発用) ----
  nginx:
    image: nginx:alpine
    container_name: mes-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy

volumes:
  pgdata:
  emqx-data:
  zk-data:
  kafka-data:
  redis-data:
  frontend-modules:
