# ============================================================
# EMQX Configuration - MES IoT Broker
# ============================================================

## Node
node.name = emqx@mes-emqx
node.cookie = emqx_secret_cookie_mes

## Cluster
cluster.discovery = static
cluster.static.seeds = ["emqx@mes-emqx"]

## Dashboard
dashboard.default.username = admin
dashboard.default.password = mes_emqx_admin

listeners.tcp.external {
  bind = "1883"
  max_connections = 1000
}

listeners.ws.external {
  bind = "8083"
  max_connections = 1000
  # WebSocket origin allow list (same-origin by default)
  cors.allow_origins = *
}

## MQTT Authentication (static table for dev)
auth.mysql {
  server = "postgres:5432"
  database = "mes_dev"
  username = "mes_admin"
  password = "mes_secret"
}

# ACL file
acl_nomad_resource.nofile = "/opt/emqx/etc/acl.conf"
